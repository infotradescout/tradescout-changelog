name: Auto-Post Generator

on:
  schedule:
    # Daily snapshot at 11:59 PM UTC every day
    - cron: '59 23 * * *'
    # Weekly digest every Sunday at 11:00 PM UTC
    - cron: '0 23 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Post mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

jobs:
  generate-daily:
    name: Generate Daily Snapshot
    runs-on: ubuntu-latest
    if: github.event.schedule == '59 23 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate daily post
        run: node scripts/generate-posts.mjs --mode daily
        env:
          GITHUB_TOKEN: ${{ secrets.GH_READ_TOKEN }}
      - name: Commit generated posts
        run: |
          git config user.name "TradeScout Bot"
          git config user.email "bot@thetradescout.com"
          git add client/src/lib/generated-posts.json
          git diff --staged --quiet || git commit -m "chore: daily auto-post $(date -u +%Y-%m-%d) [skip ci]"
          git push

  generate-weekly:
    name: Generate Weekly Digest
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 23 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weekly')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate weekly digest
        run: node scripts/generate-posts.mjs --mode weekly
        env:
          GITHUB_TOKEN: ${{ secrets.GH_READ_TOKEN }}
      - name: Commit generated posts
        run: |
          git config user.name "TradeScout Bot"
          git config user.email "bot@thetradescout.com"
          git add client/src/lib/generated-posts.json
          git diff --staged --quiet || git commit -m "chore: weekly digest $(date -u +%Y-%m-%d) [skip ci]"
          git push
